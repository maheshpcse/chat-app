<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Sign In</mat-card-title>
      <mat-card-subtitle>Welcome back! Please login to continue.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Error Alert -->
      <div class="alert-error" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Login Form (Reactive Form) -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="Enter your email">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="f.email.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="f.email.hasError('email')">Please enter a valid email</mat-error>
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password"
                 [type]="hidePassword ? 'password' : 'text'"
                 placeholder="Enter your password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="f.password.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="f.password.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <!-- Submit Button -->
        <button mat-raised-button color="primary" type="submit"
                class="full-width login-btn"
                [disabled]="isLoading">
          <mat-icon *ngIf="!isLoading">login</mat-icon>
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <p class="register-link">
        Don't have an account?
        <a routerLink="/auth/register" mat-button color="accent">Register</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
