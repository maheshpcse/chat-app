<div class="container py-4">
  <mat-card class="new-conv-card">
    <mat-card-header>
      <mat-card-title>Start New Conversation</mat-card-title>
      <mat-card-subtitle>Search for a user to start chatting</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Search Input -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Search Users</mat-label>
        <input matInput [formControl]="searchControl"
               placeholder="Type a name or username..."
               autocomplete="off">
        <mat-icon matPrefix>search</mat-icon>
        <mat-spinner matSuffix *ngIf="isSearching" diameter="20"></mat-spinner>
      </mat-form-field>

      <!-- Search Results -->
      <mat-list *ngIf="searchResults.length > 0" class="search-results">
        <mat-list-item *ngFor="let user of searchResults"
                       class="user-result"
                       (click)="startConversation(user)">
          <app-avatar matListAvatar
                      [imageUrl]="user.avatar"
                      [name]="user.fullName"
                      [isOnline]="user.isOnline"
                      size="sm">
          </app-avatar>
          <h4 matLine>{{ user.fullName }}</h4>
          <p matLine class="text-muted">@{{ user.username }}</p>
          <button mat-icon-button color="primary" matTooltip="Start chat">
            <mat-icon>chat</mat-icon>
          </button>
        </mat-list-item>
      </mat-list>

      <!-- No Results -->
      <div class="no-results text-center py-4"
           *ngIf="searchControl.value?.length >= 2 && searchResults.length === 0 && !isSearching">
        <mat-icon>person_off</mat-icon>
        <p>No users found matching "{{ searchControl.value }}"</p>
      </div>

      <!-- Creating Indicator -->
      <div class="text-center py-3" *ngIf="isCreating">
        <mat-spinner diameter="30"></mat-spinner>
        <p class="text-muted mt-2">Creating conversation...</p>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/chat">
        <mat-icon>arrow_back</mat-icon> Back to Chat
      </button>
    </mat-card-actions>
  </mat-card>
</div>
