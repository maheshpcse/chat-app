<div class="notification-list-container">
  <div class="notification-header d-flex justify-content-between align-items-center p-3">
    <h4 class="mb-0">Notifications</h4>
    <button mat-button color="primary" (click)="markAllAsRead()"
            *ngIf="notifications.length > 0">
      Mark all as read
    </button>
  </div>

  <mat-divider></mat-divider>

  <mat-list class="notification-items">
    <mat-list-item *ngFor="let notification of notifications"
                   [ngClass]="{'unread': !notification.isRead}"
                   (click)="markAsRead(notification)">
      <mat-icon matListIcon [color]="notification.isRead ? '' : 'primary'">
        {{ getNotificationIcon(notification.type) }}
      </mat-icon>
      <h4 matLine>{{ notification.title }}</h4>
      <p matLine>
        <span>{{ notification.message }}</span>
        <small class="d-block mt-1">{{ notification.createdAt | timeAgo }}</small>
      </p>
    </mat-list-item>
  </mat-list>

  <!-- Empty State -->
  <div class="empty-notifications text-center py-4" *ngIf="notifications.length === 0">
    <mat-icon>notifications_none</mat-icon>
    <p>No notifications yet</p>
  </div>
</div>
