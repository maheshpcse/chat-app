<div class="container py-4">
  <mat-card class="group-create-card">
    <mat-card-header>
      <mat-card-title>Create New Group</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="alert-error" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="groupForm" (ngSubmit)="onSubmit()">
        <!-- Group Name -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Group Name</mat-label>
          <input matInput formControlName="name" placeholder="Enter group name">
          <mat-icon matPrefix>group</mat-icon>
          <mat-error *ngIf="groupForm.get('name').hasError('required')">Name is required</mat-error>
          <mat-error *ngIf="groupForm.get('name').hasError('minlength')">Minimum 3 characters</mat-error>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description (optional)</mat-label>
          <textarea matInput formControlName="description" rows="3"
                    placeholder="What's this group about?"></textarea>
          <mat-icon matPrefix>description</mat-icon>
        </mat-form-field>

        <!-- Member Search -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Add Members</mat-label>
          <input matInput placeholder="Search users..."
                 (input)="onSearchInput($event)"
                 [matAutocomplete]="auto">
          <mat-icon matPrefix>person_add</mat-icon>
          <mat-autocomplete #auto="matAutocomplete">
            <mat-option *ngFor="let user of searchResults" (click)="addMember(user)">
              <span>{{ user.fullName }}</span>
              <small> (@{{ user.username }})</small>
            </mat-option>
          </mat-autocomplete>
        </mat-form-field>

        <!-- Selected Members Chips -->
        <div class="selected-members mb-3" *ngIf="selectedMembers.length > 0">
          <mat-chip-list>
            <mat-chip *ngFor="let member of selectedMembers"
                      [removable]="true"
                      (removed)="removeMember(member)">
              {{ member.fullName }}
              <mat-icon matChipRemove>cancel</mat-icon>
            </mat-chip>
          </mat-chip-list>
          <small class="text-muted">{{ selectedMembers.length }} member(s) selected</small>
        </div>

        <!-- Submit -->
        <button mat-raised-button color="primary" type="submit"
                class="full-width"
                [disabled]="isLoading || groupForm.invalid || selectedMembers.length === 0">
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Create Group</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
