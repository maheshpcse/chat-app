<div class="message-input-container">
  <!-- Selected File Preview -->
  <div class="file-preview" *ngIf="selectedFile">
    <mat-icon>attach_file</mat-icon>
    <span class="file-name">{{ selectedFile.name }}</span>
    <button mat-icon-button (click)="removeSelectedFile()" class="remove-file">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Upload Progress -->
  <mat-progress-bar *ngIf="isUploading" mode="indeterminate" color="accent"></mat-progress-bar>

  <!-- Input Area -->
  <div class="input-row">
    <!-- File Upload Button -->
    <button mat-icon-button (click)="fileInput.click()" [disabled]="isUploading"
            matTooltip="Attach file" class="action-btn">
      <mat-icon>attach_file</mat-icon>
    </button>
    <input #fileInput type="file" hidden (change)="onFileSelected($event)"
           accept="image/*,.pdf,.doc,.docx,.txt">

    <!-- Text Input -->
    <mat-form-field appearance="outline" class="message-field">
      <textarea matInput
                [formControl]="messageControl"
                placeholder="Type a message..."
                (keydown)="onKeyDown($event)"
                cdkTextareaAutosize
                [cdkAutosizeMinRows]="1"
                [cdkAutosizeMaxRows]="4"
                autocomplete="off">
      </textarea>
    </mat-form-field>

    <!-- Send Button -->
    <button mat-icon-button (click)="sendMessage()"
            [disabled]="isUploading || (!messageControl.value?.trim() && !selectedFile)"
            class="send-btn"
            [class.active]="messageControl.value?.trim() || selectedFile"
            matTooltip="Send message">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
